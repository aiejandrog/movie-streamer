name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── 1. Backend tests ───────────────────────────────────────────────────
  test:
    name: pytest (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          TMDB_API_KEY: ""
          VIDEOS_DIR: /tmp/test-videos
          SECRET_KEY: ci-test-secret
          ALLOWED_ORIGINS: http://localhost:5173

  # ── 2. Frontend build check ──────────────────────────────────────────────────
  build-frontend:
    name: npm build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: npm ci && npm run build

  # ── 3. Docker build (gate) ──────────────────────────────────────────────────
  #    Only runs on main — validates the multi-stage Dockerfile compiles cleanly.
  #    Image is not pushed (Railway builds its own from source).
  docker-build:
    name: docker build (validate)
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: movie-streamer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to Railway ───────────────────────────────────────────────────────
  #    Triggers after all gates pass. Uses Railway Deploy Hook URL — no CLI needed.
  #    Set RAILWAY_DEPLOY_HOOK in repo secrets (Settings → Secrets → Actions).
  deploy:
    name: deploy → Railway
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.RAILWAY_APP_URL }}
    steps:
      - name: Trigger Railway deployment
        run: |
          response=$(curl -fsS -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}")
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Railway deploy triggered — HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Deploy hook returned non-2xx status"
            exit 1
          fi
